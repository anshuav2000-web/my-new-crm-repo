version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: canvas_cartel_crm
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://crm_user:crm_secure_pass@postgres:5432/canvas_cartel?sslmode=disable
      - SESSION_SECRET=canvas_cartel_session_secret_change_me
      - REPL_ID=canvas_cartel_prod
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: canvas_cartel_db
    restart: always
    environment:
      - POSTGRES_USER=crm_user
      - POSTGRES_PASSWORD=crm_secure_pass
      - POSTGRES_DB=canvas_cartel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d canvas_cartel"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
